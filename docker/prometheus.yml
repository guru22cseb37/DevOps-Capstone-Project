global:
  scrape_interval: 15s     # Scrape interval settings (15s default)
  evaluation_interval: 15s # Evaluate rules every 15 seconds

# A scrape configuration containing exactly one endpoint to scrape:
scrape_configs:
  # 1. Prometheus Telemetry Self-Scrape
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 2. Primary Node.js Application Telemetry
  - job_name: 'devopspulse-app'
    scrape_interval: 5s    # Aggressive polling for real-time dashboard responsiveness
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:3000']

  # 3. Node Exporter System metrics Scrape
  - job_name: 'node-exporter'
    scrape_interval: 10s
    static_configs:
      - targets: ['node-exporter:9100']
